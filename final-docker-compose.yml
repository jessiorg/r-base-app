version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /data/docker/nginx/conf.d:/etc/nginx/conf.d
      - /data/docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - /data/websites:/var/www
      - /data/ssl:/etc/nginx/ssl
    networks:
      - app_network
    depends_on:
      - node

  node:
    build: ./node
    container_name: node
    restart: unless-stopped
    networks:
      - app_network
      
  paddle-ocr-api:
    build:
      context: /data/paddle-ocr-backend
      dockerfile: Dockerfile
    container_name: paddle-ocr-api
    restart: unless-stopped
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_WORKERS=4
      - LOG_LEVEL=info
      - OCR_USE_GPU=false
      - OCR_ENABLE_MKLDNN=true
      - OCR_USE_ANGLE_CLS=true
      - OCR_DET_LIMIT_SIDE_LEN=960
      - OCR_REC_BATCH_NUM=6
      - MAX_FILE_SIZE=10485760
      - ALLOWED_EXTENSIONS=png,jpg,jpeg,pdf
    ports:
      - "8001:8000"
    volumes:
      - /data/paddle-ocr-backend/logs:/var/log
      - paddle-ocr-models:/root/.paddleocr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_network

  r-api:
    build:
      context: /data/r-api
      dockerfile: Dockerfile
    container_name: r-api
    restart: unless-stopped
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - R_MAX_VSIZE=4Gb
    ports:
      - "8002:8000"
    volumes:
      - /data/r-api/logs:/var/log
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  paddle-ocr-models:
    driver: local
